```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  color: #fff;
  text-align: center;
}

/* 💖 Card */
.card {
  width: 90%;
  max-width: 420px;
  margin: 40px auto;
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

/* 💖 Name */
.name {
  font-size: 18px;
  margin-top: 5px;
  color: #ffd1dc;
}

/* 📸 Slideshow */
.slideshow {
  position: relative;
  width: 100%;
  height: 380px;
  margin-top: 15px;
  border-radius: 15px;
  overflow: hidden;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide {
  position: absolute;
  max-width: 100%;
  max-height: 100%;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active {
  opacity: 1;
  z-index: 1;
}

/* ⏳ Countdown */
#countdown {
  margin-top: 15px;
  font-size: 18px;
}

/* 💖 Heart */
.heart {
  font-size: 28px;
  margin-top: 10px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* 💌 Button */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* 💌 Message */
.message {
  display: none;
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}

/* 📱 Mobile Fix */
@media (max-width: 500px) {
  .slideshow {
    height: 260px;
  }

  .card {
    padding: 15px;
  }

  h1 {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="card">

  <h1>Counting down to your special day 💖</h1>
  <div class="name">For: GUITI!! JHIGI??? DIPPO :) 💕</div>

  <!-- 📸 Slideshow -->
  <div class="slideshow">
    <img src="12.jpg" class="slide active">
    <img src="2.jpg" class="slide">
    <img src="3.jpg" class="slide">
    <img src="4.jpg" class="slide">
  </div>

  <!-- ⏳ Countdown -->
  <div id="countdown"></div>

  <div class="heart">💗</div>

  <!-- 💌 Button -->
  <button onclick="showMessage()">Click me 💌</button>

  <div class="message" id="msg">
    You make everything brighter 💖  
    I’m really glad you exist 😊
  </div>

</div>

<script>
/* 🎯 FIXED DATE */
const birthday = new Date("2026-05-27");

function updateCountdown() {
  const now = new Date();
  const diff = birthday - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML =
      "🎉 Happy Birthday!!! 💖";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `${days}d ${hours}h ${minutes}m ${seconds}s 💕`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* 📸 FIXED Slideshow */
let slides = document.querySelectorAll(".slide");
let index = 0;

function nextSlide() {
  slides.forEach(slide => slide.classList.remove("active"));
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}

/* ensure first image shows */
slides[0].classList.add("active");

setInterval(nextSlide, 3500);

/* 💌 Message */
function showMessage() {
  document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
```
